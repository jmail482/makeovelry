<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // GitHub Pages 404 handler for clean section URLs
        // Redirects /makeoverlyonline/about → /makeoverlyonline/ and scrolls to #about
        (function() {
            var base = '/makeoverlyonline/';
            var path = window.location.pathname;
            var sections = ['about', 'experience', 'education', 'projects', 'deep-case-study', 'achievements', 'contact', 'testimonials', 'hero'];
            
            if (path.indexOf(base) === 0) {
                var segment = path.substring(base.length).replace(/\/$/, '');
                if (sections.indexOf(segment) !== -1) {
                    // Redirect to homepage — the DOMContentLoaded handler there will scroll to section
                    window.location.replace(base + '#' + segment);
                    return;
                }
            }
            // Fallback: go home
            window.location.replace(base);
        })();
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
