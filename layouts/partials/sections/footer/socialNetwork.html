{{- /* Custom footer brand + social row — matches nav style, slow-shade hover inherits from .nav-social-ic CSS */ -}}
<div class="container footer-brand-row py-4">
    <div class="row justify-content-center">
        <div class="col-auto text-center">
            <a class="footer-brand-link" href="{{ .Site.Home.RelPermalink }}" aria-label="Makeoverly home">
                <img class="footer-brand-mark" src="{{ .Site.Home.RelPermalink }}images/makeoverly-mark-light-green.svg" alt="Makeoverly logo">
                <span class="footer-brand-word">Makeover<span class="footer-brand-accent">ly</span></span>
            </a>
            <div class="footer-tagline">Forensic recovery of organic search assets</div>
        </div>
    </div>
    {{ if .Site.Params.hero.socialLinks }}
    <div class="row justify-content-center pt-3">
        <div class="col-auto">
            <div class="nav-social-icons d-inline-flex">
                {{ range .Site.Params.hero.socialLinks.fontAwesomeIcons }}
                <a href="{{ .url }}"{{ if not (or (hasPrefix .url "#") (hasPrefix .url "mailto:")) }} target="_blank" rel="noopener"{{ end }} class="nav-social-ic" aria-label="{{ .label | default "social" }}">
                    <i class="{{ .icon }}"></i>
                </a>
                {{ end }}
            </div>
        </div>
    </div>
    {{ end }}
</div>
