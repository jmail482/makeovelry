{{- /* Force light mode. Override any user-toggled or auto-detected dark preference. */ -}}
<script>
(function () {
  try { localStorage.removeItem('pref-theme'); } catch (e) {}
  document.documentElement.dataset.theme = 'light';
  if (document.body) document.body.classList.remove('dark');
  document.addEventListener('DOMContentLoaded', function () {
    document.body.classList.remove('dark');
  });
})();
</script>
{{- /* Darken body text. Overrides PaperMod default rgb(30,30,30) -> pure black. */ -}}
<style>
:root,
html[data-theme="light"] {
    --primary: rgb(0, 0, 0) !important;
    --content: rgb(0, 0, 0) !important;
    --secondary: rgb(60, 60, 60) !important;
}
</style>
