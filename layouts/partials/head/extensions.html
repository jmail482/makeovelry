<style>
/* Pure white background */
body, body.light { background-color: #ffffff !important; }
section { background-color: #ffffff !important; }
.bg-transparent { background-color: transparent !important; }
.card { background-color: #ffffff !important; }
.deep-case-study { background: #f8f9fa !important; }
.testimonial-card { background: #f8f9fa !important; }

/* NUCLEAR: every single element on the page = black, opacity 1 */
*, *::before, *::after {
    color: #000000 !important;
    opacity: 1 !important;
}

/* BLUE ACCENTS — higher specificity beats the * selector */
#hero h1 { color: #007bff !important; }
.hero-stat .stat-number { color: #007bff !important; }
.metric .metric-value { color: #007bff !important; }
.testimonial-card .quote-mark { color: #007bff !important; opacity: 0.3 !important; }

/* Buttons */
a.btn, a.btn-outline, .btn-outline { color: #007bff !important; border-color: #007bff !important; }
a.btn:hover, a.btn-outline:hover, .btn-outline:hover { color: #ffffff !important; background-color: #007bff !important; }

/* Social icons */
.social-icons a, .social-icons a i, .social-icons a svg { color: #007bff !important; }

/* Project/case study links */
.project-link a, .btn.btn-outline-primary, .case-study-link { color: #007bff !important; }
.deep-case-study a.case-study-link { color: #007bff !important; }

/* Nav brand */
.navbar-brand, .navbar-brand span { color: #007bff !important; }

/* Read Full Case Study links */
a[href*="case-stud"] { color: #007bff !important; }

/* Dark mode support */
.dark body { background-color: #1a1a2e !important; }
.dark section { background-color: #1a1a2e !important; }
.dark *, .dark *::before, .dark *::after { color: #e0e0e0 !important; }
</style>
<script>
function scrollToSection(el) {
    var section = el.getAttribute('data-section');
    var target = document.getElementById(section);
    if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
        history.replaceState(null, '', el.getAttribute('href'));
        return false;
    }
    return true;
}

(function() {
    document.addEventListener('DOMContentLoaded', function() {
        // Section navigation
        var base = '/makeoverlyonline/';
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
            var section = path.substring(base.length).replace(/\/$/, '');
            if (section && section !== '') {
                var target = document.getElementById(section);
                if (target) { setTimeout(function() { target.scrollIntoView({ behavior: 'smooth' }); }, 300); }
            }
        }
        if (window.location.hash) {
            var hash = window.location.hash.substring(1);
            var target = document.getElementById(hash);
            if (target) {
                history.replaceState(null, '', base + hash);
                setTimeout(function() { target.scrollIntoView({ behavior: 'smooth' }); }, 300);
            }
        }
    });
})();
</script>
