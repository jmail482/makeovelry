<style>
/* Pure white background */
body, body.light { background-color: #ffffff !important; }
section { background-color: #ffffff !important; }
.bg-transparent { background-color: transparent !important; }
.card { background-color: #ffffff !important; }
.deep-case-study { background: #f8f9fa !important; }
.testimonial-card { background: #f8f9fa !important; }

/* Override CSS variables to black */
:root {
    --text-color: #000000 !important;
    --text-secondary-color: #000000 !important;
}

/* ALL BLACK TEXT — targeted elements, no wildcard container */
body, body.light { color: #000000 !important; }
h1, h2, h3, h4, h5, h6 { color: #000000 !important; opacity: 1 !important; }
p, li, span, div, label, strong, em, b, i, blockquote { color: #000000 !important; }
.subtitle { color: #000000 !important; opacity: 1 !important; }
.hero-content { color: #000000 !important; opacity: 1 !important; }
.nav-link { color: #000000 !important; }
.card-body, .card-title, .card-text { color: #000000 !important; }
.deep-case-study h4, .deep-case-study p, .deep-case-study li { color: #000000 !important; }
.testimonial-card blockquote, .testimonial-card .attribution { color: #000000 !important; }
.hero-stat .stat-label, .metric .metric-label { color: #000000 !important; opacity: 1 !important; }
.case-meta, .case-meta span { color: #000000 !important; }
.badge { color: #000000 !important; }
footer, footer p, footer a { color: #000000 !important; }
a { color: #000000 !important; }

/* BLUE ACCENTS — these override the black above with higher specificity */
#hero h1 { color: #007bff !important; }
.hero-stat .stat-number { color: #007bff !important; }
.metric .metric-value { color: #007bff !important; }
.testimonial-card .quote-mark { color: #007bff !important; opacity: 0.3 !important; }

/* Buttons */
a.btn, .btn-outline, a.btn-outline { color: #007bff !important; border-color: #007bff !important; }
a.btn:hover, .btn-outline:hover, a.btn-outline:hover { color: #ffffff !important; background-color: #007bff !important; }

/* Social icons */
.social-icons a, .social-icons a i, .social-icons a svg,
.social-icons a:hover, .social-icons a:hover i { color: #007bff !important; }

/* Project/case study links */
.project-link a, .btn.btn-outline-primary { color: #007bff !important; }

/* Nav brand */
.navbar-brand, .navbar-brand span { color: #007bff !important; }

/* Read Full Case Study links */
a[href*="case-stud"], .deep-case-study a { color: #007bff !important; }
</style>
<script>
function scrollToSection(el) {
    var section = el.getAttribute('data-section');
    var target = document.getElementById(section);
    if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
        history.replaceState(null, '', el.getAttribute('href'));
        return false;
    }
    return true;
}

(function() {
    document.addEventListener('DOMContentLoaded', function() {
        // Force CSS variables
        document.documentElement.style.setProperty('--text-color', '#000000', 'important');
        document.documentElement.style.setProperty('--text-secondary-color', '#000000', 'important');

        // Force hero opacity fix via JS as final backstop
        var heroH2 = document.querySelector('#hero h2');
        if (heroH2) { heroH2.style.setProperty('opacity', '1', 'important'); heroH2.style.setProperty('color', '#000000', 'important'); }
        var heroSubtitle = document.querySelector('#hero .subtitle');
        if (heroSubtitle) { heroSubtitle.style.setProperty('opacity', '1', 'important'); heroSubtitle.style.setProperty('color', '#000000', 'important'); }
        var heroContent = document.querySelector('#hero .hero-content');
        if (heroContent) { heroContent.style.setProperty('opacity', '1', 'important'); heroContent.style.setProperty('color', '#000000', 'important'); }

        // Section navigation
        var base = '/makeoverlyonline/';
        var path = window.location.pathname;
        if (path.indexOf(base) === 0) {
            var section = path.substring(base.length).replace(/\/$/, '');
            if (section && section !== '') {
                var target = document.getElementById(section);
                if (target) { setTimeout(function() { target.scrollIntoView({ behavior: 'smooth' }); }, 300); }
            }
        }
        if (window.location.hash) {
            var hash = window.location.hash.substring(1);
            var target = document.getElementById(hash);
            if (target) {
                history.replaceState(null, '', base + hash);
                setTimeout(function() { target.scrollIntoView({ behavior: 'smooth' }); }, 300);
            }
        }
    });
})();
</script>
