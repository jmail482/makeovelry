<script>
// Auto-fit project stat numbers: find the smallest size needed by the LONGEST stat,
// then apply that same size to EVERY stat on the grid. Consistent visual hierarchy.
(function(){
  function fit() {
    var nums = document.querySelectorAll('#projects .project-stat-number');
    if (!nums.length) return;
    // Reset all to default first so measurements are clean
    nums.forEach(function(el){ el.style.fontSize = ''; });
    // Find the smallest size needed across all stats
    var minSize = 3.2;  // rem (matches CSS default)
    nums.forEach(function(el){
      var card = el.closest('.project-card-head');
      if (!card) return;
      var maxWidth = card.clientWidth * 0.86;
      var size = 3.2;
      var safety = 30;
      while (el.scrollWidth > maxWidth && size > 1.5 && safety-- > 0) {
        size -= 0.1;
        el.style.fontSize = size + 'rem';
      }
      if (size < minSize) minSize = size;
    });
    // Apply the smallest needed size to ALL stats for consistency
    nums.forEach(function(el){ el.style.fontSize = minSize + 'rem'; });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', fit);
  } else {
    fit();
  }
  window.addEventListener('resize', fit);
  // Re-fit after web fonts load (otherwise widths are wrong before fonts swap in)
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(fit);
  }
})();
</script>

<script>
/* Dark-mode runtime contrast override (matches /demos/hero-3.html — CSS cascade
   loses to the universal `* { color: #000 !important }` rule on every page, so
   we paint inline styles instead. Reverts cleanly on light toggle. */
(function () {
  const DARK_COLORS = [
    { sel: '#hero h1, #hero h2, #hero .subtitle, #hero p, #hero .hero-content, #hero .hero-content > p, #hero a.btn', color: '#E8EEF3', opacity: '1' },
    { sel: '#hero .hero-stat .stat-number, .hero-stat .stat-number', color: '#E8EEF3', opacity: '1' },
    { sel: '#hero .hero-stat .stat-label, .hero-stat .stat-label', color: '#E8EEF3', opacity: '0.78' },
    { sel: '#hero .hero-resume-link, .hero-resume-link, a[href*="Resume"]', color: '#8FB4FF', opacity: '1' },
    { sel: '.navbar .nav-link, .navbar-nav a', color: '#D8E0E8', opacity: '1' },
    { sel: '.nav-social-icons .nav-social-ic svg, .nav-social-icons .nav-social-ic i', color: '#D8E0E8', fill: '#D8E0E8' },
    { sel: '#footer, #footer *', color: '#C8D2DA', opacity: '1' },
    /* Case-study / blog / about page bodies */
    { sel: '#projects h1, #projects h2, #projects h3, #projects p, #projects .card-title, #projects .card-text', color: '#E8EEF3', opacity: '1' },
    { sel: '#about h1, #about h2, #about h3, #about p, #about .content', color: '#E8EEF3', opacity: '1' },
    { sel: '#experience h1, #experience h2, #experience h3, #experience p, #experience .nav-link, #experience .tab-pane', color: '#E8EEF3', opacity: '1' },
    { sel: '#deepCaseStudy h1, #deepCaseStudy h2, #deepCaseStudy p, #deepCaseStudy *', color: '#E8EEF3', opacity: '1' },
    { sel: 'main h1, main h2, main h3, main p, main li, main .post-title, main .post-entry, main .post-content, main .post-meta, main article', color: '#E8EEF3', opacity: '1' },
  ];
  const MARK = 'data-dark-applied';

  function applyDark() {
    for (const { sel, color, opacity, fill } of DARK_COLORS) {
      document.querySelectorAll(sel).forEach((el) => {
        if (color) el.style.setProperty('color', color, 'important');
        if (opacity !== undefined) el.style.setProperty('opacity', opacity, 'important');
        if (fill) el.style.setProperty('fill', fill, 'important');
        el.setAttribute(MARK, '1');
      });
    }
  }
  function clearDark() {
    document.querySelectorAll('[' + MARK + ']').forEach((el) => {
      el.style.removeProperty('color');
      el.style.removeProperty('opacity');
      el.style.removeProperty('fill');
      el.removeAttribute(MARK);
    });
  }
  function sync() {
    if (document.body.classList.contains('dark') || document.documentElement.classList.contains('dark')) {
      applyDark();
    } else {
      clearDark();
    }
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', sync);
  } else {
    sync();
  }
  const observer = new MutationObserver(sync);
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
})();
</script>
