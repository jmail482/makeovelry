            content: |-
              14 years of independent SEO consulting across local, technical, and entity SEO. Currently focused on:

              - **Excalibur Marketing Engine** — 14-module multi-LLM audit system producing 22-tab interactive HTML deliverables
              - **Dental DSO vertical** — Tooth Corner engagement: 2,000+ CDCP keywords mapped across 152 Canadian cities, 30+ Ontario locations
              - **Hospitality vertical** — Distillery Events: entity disambiguation, schema remediation, projected $233K–$382K 12-month revenue recovery
              - **JobHarvest** — Lead scoring and filtering system for SEO job leads (Python, 688-line scoring methodology)
              - **autocomplete_multiplex.py** — Multi-backend keyword research routing with automatic failover and credit tracking
      - company: "Tetrault Wealth Advisory Group (TWAG)"
        companyUrl: ""
        jobs:
          - name: "SEO Lead (Retainer)"
            date: "Nov 2019 – Nov 2025"
            content: |-
              Six-year retainer engagement. Key outcomes:

              - Anchor advisor lifted from **#6 to #2** on Wealth Professional Canada's Top-50 Advisors list
              - 33 location pages built across every Canadian province
              - Top-100 ranked URL share went from **26% to 55%**
              - Cloudflare + Argo Smart Routing deployment: **+104% keyword visibility lift** (SEMrush-verified)
              - 138 bi-weekly KPI reports delivered

