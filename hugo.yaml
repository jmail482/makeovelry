    title: "About Me"
    image: ""
    content: |-
      Fourteen years in digital marketing. A six-year retainer engagement leading SEO for a Canadian wealth advisory firm — anchor advisor lifted from #6 to #2 on Wealth Professional Canada's Top-50 list during the engagement. 138 bi-weekly KPI reports shipped.

      Currently building **AI-driven marketing engines** for dental DSO, hospitality, and healthcare verticals. My approach combines a 40-factor Map Pack audit framework with sector-specific overlays, a 14-module business growth intelligence layer (Excalibur), and live LLM-assisted research at every stage.

      Based in Winnipeg, MB. Working remotely. 4 active client engagements.
    skills:
      enable: true
      title: "Core competencies:"
      items:
        - "Entity SEO & Knowledge Graph Optimization"
        - "Technical SEO at Scale"
        - "Local SEO & Multi-Location Strategy"
        - "AI Overview / SGE Readiness"
        - "PR-as-SEO Pipelines"
        - "Schema & Structured Data"
        - "Multi-LLM Marketing Engines"
        - "Python Automation"
        - "Programmatic SEO"
        - "Google Ads & Meta Ads"

